name: MERN CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend
      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Lint backend
        run: |
          cd server
          npm run lint || echo "No lint configured"

