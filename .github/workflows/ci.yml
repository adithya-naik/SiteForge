name: MERN CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------
      # Backend (server) steps
      # ------------------------
      - name: Cache backend node modules
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            server-node-modules-

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Lint backend
        run: |
          cd server
          npm run lint || echo "No lint configured"

      # ------------------------
      # Frontend (client) steps
      # ------------------------
      # - name: Cache frontend node modules
      #   uses: actions/cache@v3
      #   with:
      #     path: client/node_modules
      #     key: client-node-modules-${{ hashFiles('client/package-lock.json') }}
      #     restore-keys: |
      #       client-node-modules-

      # - name: Install frontend dependencies
      #   run: |
      #     cd client
      #     npm install

      # - name: Lint frontend
      #   run: |
      #     cd client
      #     npm run lint || echo "No lint configured"

      # - name: Build frontend
      #   run: |
      #     cd client
      #     npm run build || echo "No build step"

      # ------------------------
      # CodeRabbit
      # ------------------------
      - name: Run CodeRabbit
        uses: coderabbitio/code-review-action@v1
        with:
          coderabbit-token: ${{ secrets.CODERABBIT_TOKEN }}