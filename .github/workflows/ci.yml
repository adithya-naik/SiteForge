name: MERN CI

on:
  pull_request:
  push:
    
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------
      # Backend (server) steps
      # ------------------------
      - name: Cache backend node modules
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            server-node-modules-

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Auto-fix backend lint
        run: |
          cd server
          npm run lint:fix
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "ci: auto-fix lint issues" || echo "No lint changes"
          git push origin HEAD:${{ github.head_ref }} || echo "Push failed"
          
      - name: Lint backend
        run: |
          cd server
          npm run lint

      # ------------------------
      # Frontend (client) steps
      # ------------------------
      - name: Cache frontend node modules
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-node-modules-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            client-node-modules-

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Auto-fix frontend lint
        run: |
          cd client
          npm run lint:fix
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "ci: auto-fix lint issues" || echo "No lint changes"
          git push origin HEAD:${{ github.head_ref }} || echo "Push failed"

      - name: Lint frontend
        run: |
          cd client
          npm run lint

      - name: Build frontend
        run: |
          cd client
          npm run build