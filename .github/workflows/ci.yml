name: MERN CI

on:
  pull_request:
  push:

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo (fetch full history for rebase)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      # ------------------------
      # Backend (server) steps
      # ------------------------
      - name: Cache backend node modules
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            server-node-modules-

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Auto-fix backend lint
        run: |
          cd server
          npm run lint:fix
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.head_ref }}
          git add -A
          git diff --staged --quiet || git commit -m "ci: auto-fix backend lint issues"
          git push origin HEAD:${{ github.head_ref }} || echo "No changes to push"

      - name: Lint backend
        run: |
          cd server
          npm run lint

      # ------------------------
      # Frontend (client) steps
      # ------------------------
      - name: Cache frontend node modules
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-node-modules-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            client-node-modules-

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Auto-fix frontend lint
        run: |
          cd client
          npm run lint:fix
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.head_ref }}
          git add -A
          git diff --staged --quiet || git commit -m "ci: auto-fix frontend lint issues"
          git push origin HEAD:${{ github.head_ref }} || echo "No changes to push"

      - name: Lint frontend
        run: |
          cd client
          npm run lint

      - name: Build frontend
        run: |
          cd client
          npm run build