name: MERN CI

on:
  pull_request:
  push:

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------
      # Backend (server) steps
      # ------------------------
      - name: Cache backend node modules
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            server-node-modules-

      - name: Install backend dependencies
        id: backend-install
        run: |
          cd server
          npm ci --prefer-offline --no-audit --fund=false
        continue-on-error: false

      - name: Auto-fix backend lint
        id: backend-lint-fix
        run: |
          cd server

          npm run lint:fix --if-present || true

          git add -A
          if git diff --staged --quiet; then
            echo "No backend lint issues to fix"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_MSG="ci: auto-fix backend lint issues [skip ci]

          Co-authored-by: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          Triggered by: #${{ github.event.pull_request.number }}"

          git commit -m "$COMMIT_MSG"

          for i in {1..3}; do
            git pull --rebase origin ${{ github.head_ref || github.ref_name }} && \
            git push origin HEAD:${{ github.head_ref || github.ref_name }} && \
            break || sleep 5
          done

      - name: Lint backend
        id: backend-lint
        run: |
          cd server
          npm run lint
        continue-on-error: false

      # ------------------------
      # Frontend (client) steps
      # ------------------------
      - name: Cache frontend node modules
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-node-modules-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            client-node-modules-

      - name: Install frontend dependencies
        id: frontend-install
        run: |
          cd client
          npm ci --prefer-offline --no-audit --fund=false
        continue-on-error: false

      - name: Auto-fix frontend lint
        id: frontend-lint-fix
        run: |
          cd client

          npm run lint:fix --if-present || true

          git add -A
          if git diff --staged --quiet; then
            echo "No frontend lint issues to fix"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_MSG="ci: auto-fix frontend lint issues [skip ci]

          Co-authored-by: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          Triggered by: #${{ github.event.pull_request.number }}"

          git commit -m "$COMMIT_MSG"

          for i in {1..3}; do
            git pull --rebase origin ${{ github.head_ref || github.ref_name }} && \
            git push origin HEAD:${{ github.head_ref || github.ref_name }} && \
            break || sleep 5
          done

      - name: Lint frontend
        id: frontend-lint
        run: |
          cd client
          npm run lint
        continue-on-error: false

      - name: Build frontend
        id: frontend-build
        run: |
          cd client
          npm run build
        continue-on-error: false

      # ------------------------
      # Summary step
      # ------------------------
      - name: Summary
        if: always()
        run: |
          echo "## CI Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Install | ${{ steps.backend-install.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint Fix | ${{ steps.backend-lint-fix.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ steps.backend-lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Install | ${{ steps.frontend-install.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint Fix | ${{ steps.frontend-lint-fix.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ steps.frontend-lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ steps.frontend-build.outcome }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.backend-lint.outcome }}" != "success" ] || \
             [ "${{ steps.frontend-lint.outcome }}" != "success" ] || \
             [ "${{ steps.frontend-build.outcome }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **CI Failed!** Please check the logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          fi