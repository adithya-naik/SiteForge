name: Auto Assigner

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kentaro-m/auto-assign-action@v1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-file: ".github/auto_assign.yml"