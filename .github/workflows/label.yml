name: Labeler

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  label-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];
            if (title.includes('fix') || title.includes('bug') || title.includes('error')) labels.push('bug');
            if (title.includes('add') || title.includes('implement') || title.includes('setup')) labels.push('enhancement');
            if (title.includes('prettier') || title.includes('lint') || title.includes('ci')) labels.push('dx');
            if (title.includes('terms') || title.includes('privacy')) labels.push('documentation');
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }